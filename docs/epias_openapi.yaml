        Yanıt alanları float'a normalize edilir.
      security:
        - CasTicket: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DateRangeBody"
      responses:
        "200":
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date-time
                        total:
                          type: number
                          description: Toplam üretim (MWh)
                        naturalGas:
                          type: number
                        wind:
                          type: number
                        sun:
                          type: number
                        lignite:
                          type: number
                        hardCoal:
                          type: number
                        importCoal:
                          type: number
                        fuelOil:
                          type: number
                        geothermal:
                          type: number
                        hydro:
                          type: number
                        biomass:
                          type: number
                        river:
                          type: number
                        international:
                          type: number
                        naphtha:
                          type: number
                        lng:
                          type: number
                        nuclear:
                          type: number
                        others:
                          type: number

