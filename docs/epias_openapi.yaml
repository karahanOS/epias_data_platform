openapi: "3.0.3"

info:
  title: EPIAS Transparency Electricity API
  version: "1.0"
  description: |
    Türkiye elektrik piyasası şeffaflık verileri API'si.
    Base URL: `https://seffaflik.epias.com.tr/electricity-service`

    ## Veri Gecikmeleri (Data Delays)

    | Veri Grubu | Gecikme | Açıklama |
    |-----------|---------|---------|
    | Fiyat verileri (PTF, SMF, GÖP, GİP, DGP) | T+0 | Gerçek zamanlı |
    | UEVM (Uzlaştırma Veriş Miktarı) | T+1 | Bir gün sonra |
    | Üretim / Tüketim | T+2 | İki gün sonra kesinleşir |
    | YEKDEM Lisanssız Üretim | T+35 | Aylık uzlaştırma döngüsü |

    ## Authentication (CAS)

    Tüm istekler CAS (Central Authentication Service) ile kimlik doğrulaması gerektirir.

    1. `/cas/v1/tickets` endpoint'ine kullanıcı adı ve şifre ile POST yapın → TGT token alın.
    2. Aldığınız TGT'yi her API isteğinde `TGT` header'ı olarak gönderin.
    3. TGT yaklaşık 1.5 saat geçerlidir; 401 yanıtı aldığınızda yenileyin.

    ## Tarih Formatı

    Tüm tarih parametreleri ISO 8601 + Türkiye timezone (+03:00) formatındadır:
    - Gün başlangıcı: `2024-01-15T00:00:00+03:00`
    - Gün sonu:       `2024-01-15T23:00:00+03:00`

    ## Rate Limiting

    EPIAS maksimum ~80 istek/dakika destekler.

servers:
  - url: https://seffaflik.epias.com.tr/electricity-service
    description: Production

  - url: https://giris.epias.com.tr
    description: CAS Authentication Server

tags:
  - name: auth
    description: CAS kimlik doğrulama
  - name: markets-dam
    description: Gün Öncesi Piyasa (GÖP)
  - name: markets-idm
    description: Gün İçi Piyasa (GİP)
  - name: markets-bpm
    description: Dengeleme Güç Piyasası (DGP/YAL/YAT)
  - name: markets-general
    description: Genel Piyasa Verileri
  - name: generation
    description: Elektrik Üretimi
  - name: consumption
    description: Elektrik Tüketimi
  - name: renewables
    description: Yenilenebilir Enerji (YEKDEM)
  - name: dams
    description: Baraj Verileri

# ─────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────
components:
  securitySchemes:
    CasTicket:
      type: apiKey
      in: header
      name: TGT
      description: |
        CAS Ticket Granting Token. POST /cas/v1/tickets ile alınır.

  parameters:
    startDate:
      name: startDate
      in: query
      required: false
      description: "ISO 8601 başlangıç tarihi (örn: 2024-01-15T00:00:00+03:00)"
      schema:
        type: string
        format: date-time
        example: "2024-01-15T00:00:00+03:00"

    endDate:
      name: endDate
      in: query
      required: false
      description: "ISO 8601 bitiş tarihi (örn: 2024-01-15T23:00:00+03:00)"
      schema:
        type: string
        format: date-time
        example: "2024-01-15T23:00:00+03:00"

  schemas:
    DateRangeBody:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date-time
          example: "2024-01-15T00:00:00+03:00"
        endDate:
          type: string
          format: date-time
          example: "2024-01-15T23:00:00+03:00"

    SingleDateBody:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date-time
          example: "2024-01-15T00:00:00+03:00"

    ItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object

    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
              message:
                type: string

# ─────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────
paths:

  # ── AUTH ──────────────────────────────────────────────────
  /cas/v1/tickets:
    post:
      tags: [auth]
      summary: TGT Token Al
      description: |
        CAS kimlik doğrulaması. Kullanıcı adı ve şifre ile TGT (Ticket Granting Token) alır.
        Token yanıt header'ının `Location` alanında veya body'de döner.
      servers:
        - url: https://giris.epias.com.tr
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: kullanici@epias.com.tr
                password:
                  type: string
                  format: password
      responses:
        "201":
          description: TGT başarıyla oluşturuldu
          headers:
            Location:
              description: TGT token URL
              schema:
                type: string
          content:
            text/plain:
              schema:
                type: string
                example: "TGT-123456789abcdef"
        "400":
          description: Geçersiz kimlik bilgileri

  # ── GÖP (DAY-AHEAD MARKET) ────────────────────────────────
  /v1/markets/dam/data/mcp:
    post:
      tags: [markets-dam]
      summary: PTF / MCP (Piyasa Takas Fiyatı)
      description: Gün Öncesi Piyasa takas fiyatları (PTF/MCP).
      security:
        - CasTicket: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DateRangeBody"
      responses:
        "200":
          description: Başarılı
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date-time
                        mcp:
                          type: number
                          description: Piyasa Takas Fiyatı (TL/MWh)
                        smp:
                          type: number
                          description: Sistem Marjinal Fiyatı (TL/MWh)
                        sdf:
                          type: number
                          description: Sistem Dengesizlik Fiyatı (TL/MWh)
        "400":
          $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Kimlik doğrulama hatası - TGT yenile

  /v1/markets/dam/data/supply-demand:
    post:
      tags: [markets-dam]
      summary: Arz-Talep Eğrisi (GÖP)
      description: Belirli bir gün için Gün Öncesi Piyasa arz ve talep eğrisi verileri.
      security:
