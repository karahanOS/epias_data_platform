          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemsResponse"

  /v1/markets/idm/data/bid-offer-quantities:
    post:
      tags: [markets-idm]
      summary: GİP Alış/Satış Teklifleri
      description: Gün İçi Piyasa alış ve satış teklif miktarları.
      security:
        - CasTicket: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DateRangeBody"
      responses:
        "200":
          description: Başarılı
          content:
            application/json:
              schema:
