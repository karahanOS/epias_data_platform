        `organizationId` ve `uevcbId` ile filtrelenebilir.
      security:
        - CasTicket: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [startDate, endDate]
              properties:
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                region:
                  type: string
                  default: TR1
                  description: Bölge kodu
                organizationId:
                  type: integer
                  description: Organizasyon ID (isteğe bağlı filtre)
                uevcbId:
                  type: integer
                  description: UEVCB (Uzlaştırma Birimi) ID (isteğe bağlı filtre)
      responses:
        "200":
          description: Başarılı
          content:
            application/json:
              schema:
