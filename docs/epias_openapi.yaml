                  type: string
                  format: date-time
                  example: "2024-01-15T00:00:00+03:00"
                endDate:
                  type: string
                  format: date-time
                  example: "2024-01-15T23:00:00+03:00"
                regionId:
                  type: integer
                  default: 1
                  description: Bölge ID (1 = Türkiye)
      responses:
        "200":
          description: Başarılı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemsResponse"

