# epias_dbt/models/staging/sources.yml
version: 2

sources:
  - name: silver
    # Ortam değişkeninden GCP Proje ID'sini çeker, bulamazsa varsayılan olarak epias-data-platform kullanır.
    database: "{{ env_var('GCP_PROJECT_ID', 'epias-data-platform') }}"
    schema: silver
    tables:
      # --- Piyasalar ve Fiyatlar ---
      - name: pricing
      - name: dam_clearing
      - name: idm_transactions
      - name: smf
      - name: system_direction
      
      # --- Üretim ve Arz ---
      - name: generation
      - name: unlicensed
      - name: res_forecast
      - name: aic
      - name: supply_demand
      
      # --- Tüketim ve Talep ---
      - name: load_estimation
      - name: price_ind_bid
      - name: consumption
      
      # --- Dengesizlik ve DGP ---
      - name: imbalance
      - name: order_up
      - name: order_down
      
      # --- Boyut (Dimension) ve Dış Faktör Tabloları ---
      - name: participants
      - name: uevcb_list
      - name: dams
      - name: outages
      - name: weather