x-airflow-common: &airflow-common
  build: .
  env_file: [.env]
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    PYTHONPATH: /opt/airflow/src
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/gcp-key.json
    JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/opt/airflow/src
    - ./logs:/opt/airflow/logs
    - ./credentials:/opt/airflow/credentials
    - ./epias_dbt:/opt/airflow/epias_dbt
    - ./spark_jobs:/opt/airflow/spark
    - /var/run/docker.sock:/var/run/docker.sock
  user: "${AIRFLOW_UID:-50000}:0"
  networks:
    - epias-net

services:

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    entrypoint: []
    environment:
      - SPARK_MODE=master
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/credentials/gcp-key.json
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./spark_jobs:/opt/airflow/spark
      - ./credentials:/opt/credentials
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --ip 0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    stdin_open: true
    tty: true
    networks:
      - epias-net

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    entrypoint: []
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/credentials/gcp-key.json
    depends_on:
      spark-master:
        condition: service_healthy
    volumes:
      - ./spark_jobs:/opt/airflow/spark
      - ./credentials:/opt/credentials
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - epias-net

  postgres:
    image: postgres:13
    container_name: epias_postgres
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    networks:
      - epias-net

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          --password admin &&
        airflow connections add spark_default \
          --conn-type spark \
          --conn-host spark-master \
          --conn-port 7077
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/logs &&
        chmod -R 775 /opt/airflow/logs &&
        airflow webserver
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_healthy
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/airflow/logs &&
        chmod -R 775 /opt/airflow/logs &&
        airflow scheduler
    restart: unless-stopped

networks:
  epias-net:
    driver: bridge